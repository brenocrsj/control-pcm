{% extends "base.html" %}
{% block content %}
<h3>{{ 'Editar' if item else 'Nova' }} OS</h3>

<form method="post" class="mt-3">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Equipamento</label>
      <select class="form-select" name="equipamento_id" required>
        <option value="">Selecione</option>
        {% for e in equipamentos %}
          <option value="{{ e.id }}" {% if item and item.equipamento_id == e.id %}selected{% endif %}>
            {{ e.nome }} ({{ e.codigo }})
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Título</label>
      <input class="form-control" name="titulo" value="{{ item.titulo if item else '' }}" required>
    </div>

    <div class="col-md-12">
      <label class="form-label">Descrição</label>
      <textarea class="form-control" name="descricao" rows="3">{{ item.descricao if item and item.descricao else '' }}</textarea>
    </div>

    <div class="col-md-3">
      <label class="form-label">Prioridade</label>
      <select class="form-select" name="prioridade">
        {% for p in ['BAIXA','MEDIA','ALTA','URGENTE'] %}
          <option value="{{ p }}" {% if item and item.prioridade==p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-3">
      <label class="form-label">Status</label>
      <select class="form-select" name="status">
        {% for s in all_statuses %}
          <option value="{{ s }}" {% if item and item.status==s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-success" type="submit">Salvar</button>
    <a class="btn btn-secondary" href="{{ url_for('os_list') }}">Voltar</a>
  </div>
</form>
{% endblock %}
