<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}PCM • Controle de Manutenção{% endblock %}</title>

  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/pcm-ui.css') }}">
</head>

<body>
  <div class="topbar">
    <div class="brand-mini" title="PCM UI">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2.75l1.1 2.52c.2.47.66.78 1.17.8l2.74.14-1.88 1.86c-.36.36-.5.88-.35 1.36l.74 2.65-2.45-1.42c-.45-.26-1-.26-1.45 0L9.17 12.1l.74-2.65c.14-.48 0-1-.35-1.36L7.68 6.21l2.74-.14c.51-.02.96-.33 1.17-.8L12 2.75z" stroke="rgba(11,58,151,.7)" stroke-width="1.5"/>
        <path d="M12 7.5a4.5 4.5 0 104.5 4.5A4.51 4.51 0 0012 7.5z" fill="rgba(29,106,255,.22)"/>
      </svg>
      PCM • Controle de Manutenção
    </div>

    <div class="top-actions">
      {% if current_user.is_authenticated %}
        <a class="btn btn-ghost" href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a class="btn btn-ghost" href="{{ url_for('main.horimetros') }}">Horímetro</a>
        <a class="btn btn-primary" href="{{ url_for('auth.logout') }}">Sair</a>
      {% else %}
        <a class="btn btn-ghost" href="{{ url_for('auth.login') }}">Entrar</a>
        <a class="btn btn-primary" href="{{ url_for('auth.register') }}">Criar conta</a>
      {% endif %}
    </div>
  </div>

  {% block body %}{% endblock %}
</body>
</html>
