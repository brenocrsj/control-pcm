{% extends "base.html" %}
{% block content %}
<h3>{{ 'Editar' if item else 'Novo' }} Equipamento</h3>

<form method="post" class="mt-3">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nome</label>
      <input class="form-control" name="nome" value="{{ item.nome if item else '' }}" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Código</label>
      <input class="form-control" name="codigo" value="{{ item.codigo if item else '' }}" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Tipo</label>
      <input class="form-control" name="tipo" value="{{ item.tipo if item else '' }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Horímetro atual</label>
      <input class="form-control" type="number" name="horimetro_atual" value="{{ item.horimetro_atual if item else 0 }}">
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="ativo" id="ativo" {% if item is none or item.ativo %}checked{% endif %}>
        <label class="form-check-label" for="ativo">Ativo</label>
      </div>
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-success" type="submit">Salvar</button>
    <a class="btn btn-secondary" href="{{ url_for('equipamentos') }}">Voltar</a>
  </div>
</form>
{% endblock %}
